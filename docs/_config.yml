# Site settings
title: "BMAD Planning & Orchestrator"
description: "A Claude Code plugin marketplace plugin that harnesses the BMAD Method for planning, roadmapping, and conflict-free parallel orchestration — then hands the work off to your dev tools. It plans and orchestrates. It never writes the code."
tagline: "Plan it right. Hand it off. Let your dev tools build."
baseurl: "/claude-code-bmad-skills"
url: "https://aj-geddes.github.io"

# SEO and social
twitter:
  username: bmadmethod
  card: summary_large_image

social:
  name: BMAD Planning & Orchestrator
  links:
    - https://github.com/aj-geddes/claude-code-bmad-skills
    - https://github.com/bmad-code-org/BMAD-METHOD

# Author
author:
  name: "BMAD Method Community"
  url: "https://github.com/bmad-code-org/BMAD-METHOD"

# Build settings
markdown: kramdown
theme: minima
highlighter: rouge

# Header navigation - limit pages shown in navbar
header_pages:
  - getting-started.md
  - skills/index.md
  - subagent-patterns.md
  - examples/index.md

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Collections
collections:
  skills:
    output: true
    permalink: /skills/:name/
  examples:
    output: true
    permalink: /examples/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "skills"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "examples"
    values:
      layout: "default"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# SEO defaults
lang: en_US
logo: /assets/images/bmad-logo.png

# Google Analytics (optional - add your tracking ID)
# google_analytics: UA-XXXXXXXX-X

# Keywords for SEO
keywords:
  - Claude Code
  - BMAD Method
  - BMAD Planning Orchestrator
  - Claude Code plugin
  - agile planning
  - AI-assisted planning
  - parallel orchestration
  - conflict-free parallel development
  - product requirements
  - system architecture
  - sprint planning
  - handoff manifest
  - AI agent orchestration
  - upstream planning
  - wave-based parallelism
