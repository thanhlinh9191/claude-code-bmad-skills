# BMAD Sprint Status — Sequencing System-of-Record
# Generated: {{TIMESTAMP}}
# Project: {{PROJECT_NAME}}
#
# STATUS LIFECYCLE (view only — not a metric):
#   backlog → ready-for-dev → in-progress → review → done
#
# CAPACITY MODEL: wave width (stories that can run concurrently), not points.
# NO velocity, burndown, or point fields belong in this file.

project_name: "{{PROJECT_NAME}}"
track: "{{TRACK}}"            # Quick Flow | BMad Method | Enterprise
generated_at: "{{TIMESTAMP}}"
last_updated: "{{TIMESTAMP}}"

# ---------------------------------------------------------------------------
# EPICS — ordered by delivery sequence (matches epics.md / prd.md ordering)
# ---------------------------------------------------------------------------
epics:
  - id: "epic-1"
    title: "{{EPIC_1_TITLE}}"
    description: "{{EPIC_1_DESCRIPTION}}"
    status: backlog             # backlog | in-progress | done
    story_ids:
      - "{{EPIC_1_STORY_IDS}}"

  # - id: "epic-2"
  #   title: "{{EPIC_2_TITLE}}"
  #   description: "{{EPIC_2_DESCRIPTION}}"
  #   status: backlog
  #   story_ids:
  #     - "..."

# ---------------------------------------------------------------------------
# STORIES — ordered: epic first, then dependency-topological within each epic
#
# parallel_set: integer wave number (1 = first wave, 2 = second wave, …)
#   Stories in the same wave have no mutual dependencies and may run concurrently.
#
# owned_scope: explicit list of files/modules this story may touch.
#   Two stories in the same parallel_set MUST have non-overlapping owned_scope.
#
# dependencies: list of story ids that must reach status=done before this story
#   can advance to ready-for-dev.
# ---------------------------------------------------------------------------
stories:
  - id: "{{EPIC_ID}}.{{STORY_NUMBER}}.{{SLUG}}"
    title: "{{STORY_TITLE}}"
    epic_id: "{{EPIC_ID}}"
    status: ready-for-dev       # backlog | ready-for-dev | in-progress | review | done
    file: "bmad-output/stories/{{STORY_FILE}}.story.md"
    parallel_set: 1             # wave assignment (integer)
    dependencies: []            # story ids; empty = no prerequisites
    owned_scope:
      - "{{PATH_OR_MODULE_1}}"  # explicit list of paths this story may touch

  # Example of a story in wave 2 (depends on a wave-1 story):
  # - id: "2.1.stripe-integration"
  #   title: "Stripe payment integration"
  #   epic_id: "epic-2"
  #   status: backlog
  #   file: "bmad-output/stories/2.1.stripe-integration.story.md"
  #   parallel_set: 2
  #   dependencies:
  #     - "1.3.user-auth-api"
  #   owned_scope:
  #     - "src/payments/stripe.ts"
  #     - "src/payments/webhook.ts"

# ---------------------------------------------------------------------------
# SEQUENCING SUMMARY (human-readable view, updated on each re-sequence)
# ---------------------------------------------------------------------------
sequencing_summary:
  total_epics: 0
  total_stories: 0
  total_waves: 0
  wave_widths: []              # [3, 2, 4] = wave1 has 3 stories, wave2 has 2, etc.
  ready_for_dev:
    count: 0
    story_ids: []
  handoff_notes: ""            # free-text for dev tool / next-agent context
